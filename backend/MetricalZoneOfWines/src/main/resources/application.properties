spring.application.name=MetricalZoneOfWines
# Configuración de la Fuente de Datos (DataSource)
spring.datasource.url=jdbc:mysql://localhost:3307/wines_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=wines_user
spring.datasource.password=Password123#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# Como usa Flyway, lo ideal es que Hibernate solo valide la estructura, no que cree tablas.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Si la base de datos ya tiene tablas creadas manualmente, use esto para la primera vez:
spring.flyway.baseline-on-migrate=true

server.port=8181