spring.application.name=MetricalZoneOfWines
# Configuración de la Fuente de Datos (DataSource)
spring.datasource.url=jdbc:mysql://localhost:3307/wines_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=wines_user
spring.datasource.password=Password123#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# Como usa Flyway, lo ideal es que Hibernate solo valide la estructura, no que cree tablas.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Si la base de datos ya tiene tablas creadas manualmente, use esto para la primera vez:
spring.flyway.baseline-on-migrate=true

# ===============================
# CONFIGURACIÓN DE RED Y SEGURIDAD
# ===============================
# Justificación de Seguridad: Se mitiga la superficie de ataque evadiendo
# puertos estándar (8080, 8181, 9000), los cuales son objetivo principal de
# escáneres automatizados (port scanning) y ataques de fuerza bruta. Se asigna
# un puerto en el rango efímero/no privilegiado (14080), preparando la aplicación
# para operar en un entorno de red privada detrás de un Reverse Proxy o API Gateway
# (ej. Nginx, Traefik) que exponga únicamente los puertos 80/443 al exterior.
server.port=14080