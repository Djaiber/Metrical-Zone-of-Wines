# SpringBoot Application Configuration
# Environment: Development
# Last Updated: 2026-03-18

spring:
  application:
    name: wine-analytics-api

  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/wine_analytics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # MongoDB Configuration
  data:
    mongodb:
      host: localhost
      port: 27017
      database: wine_reviews
      username: ${MONGO_USERNAME:admin}
      password: ${MONGO_PASSWORD:password}
      authentication-database: admin

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Logging
logging:
  level:
    com.metricalzone: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.flywaydb: INFO

# Application-specific properties
app:
  security:
    jwt-secret: ${JWT_SECRET:developmentSecretKey}
    jwt-expiration: 86400000 # 24 hours
  review:
    max-length: 2000
    min-rating: 1
    max-rating: 5
